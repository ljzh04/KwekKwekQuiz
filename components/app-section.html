<div id="app-section" class="content-section hidden mx-auto w-8/8 lg:w-3/4 p-6 bg-md-surface dark:bg-gray-800 rounded-lg shadow-md-1 dark:border-gray-600 transition-colors duration-300">
  <header class="app-section__header border-b border-md-outline dark:border-gray-600 mb-6 pb-4">
  <div class="flex flex-col md:flex-row md:items-end gap-4">
    <div class="flex-grow">
      <label for="quiz-name-input" class="block mb-1 text-sm font-medium text-md-on-surface-variant dark:text-gray-400">
        Quiz Name
      </label>
      <input type="text" id="quiz-name-input" 
        class="w-full text-xl font-semibold p-2 bg-transparent border-b-2 border-md-outline focus:border-md-primary outline-none transition-all dark:text-white" 
        placeholder="Untitled Quiz..." />
    </div>

    <div class="flex items-center gap-2">
      <button id="save-quiz-btn" class="md-filled-button flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded-full transition-all shadow-sm">
        <span class="material-symbols-outlined text-lg">save</span>
        <span>Save</span>
      </button>
      
      <div class="flex border-l border-md-outline dark:border-gray-700 ml-2 pl-2 gap-1">
        <button id="share-quiz-btn" title="Share" aria-label="Share Quiz" 
          class="p-2 rounded-full hover:bg-md-surface-variant dark:hover:bg-gray-700 text-md-primary dark:text-blue-400 transition-colors">
          <span class="material-symbols-outlined">share</span>
        </button>
        <button id="download-quiz-btn" title="Receive" aria-label="Receive Quiz" 
          class="p-2 rounded-full hover:bg-md-surface-variant dark:hover:bg-gray-700 text-md-primary dark:text-blue-400 transition-colors">
          <span class="material-symbols-outlined">download</span>
        </button>
      </div>
    </div>
  </div>
</header>

<section id="quiz-setup" class="quiz-setup space-y-6">
  <div id="editor-unit" class="editor-unit border border-md-outline dark:border-gray-600 rounded-xl overflow-hidden shadow-sm">
    
    <div class="editor-toolbar flex flex-wrap items-center justify-between gap-3 p-3 bg-md-surface-variant dark:bg-gray-700 border-b border-md-outline dark:border-gray-600">
      <div class="flex items-center gap-2">
        <button id="generate-json-btn" class="md-filled-button flex items-center gap-2 bg-md-primary hover:bg-opacity-90 text-white font-medium py-1.5 px-4 rounded-md shadow-sm transition-all">
          <span class="material-symbols-outlined text-lg">auto_fix_high</span>
          <span class="text-sm">Generate AI</span>
        </button>
        
        <label for="quiz-image-input" class="cursor-pointer flex items-center gap-2 py-1.5 px-3 rounded-md border border-md-outline hover:bg-md-surface dark:hover:bg-gray-600 transition-all text-md-on-surface dark:text-gray-200">
          <span class="material-symbols-outlined text-lg">image</span>
          <span class="text-sm hidden sm:inline">Add Context</span>
          <input type="file" id="quiz-image-input" accept="image/*" class="hidden">
        </label>
      </div>
      
      <div class="flex items-center gap-1">
        <button id="format-json-btn" class="text-sm flex items-center gap-1 py-1.5 px-3 rounded-md hover:bg-md-surface dark:hover:bg-gray-600 text-md-on-surface-variant dark:text-gray-300 transition-colors">
          <span class="material-symbols-outlined text-md">format_align_left</span>
          Format
        </button>
        <button id="load-sample-btn" class="text-sm flex items-center gap-1 py-1.5 px-3 rounded-md hover:bg-md-surface dark:hover:bg-gray-600 text-md-on-surface-variant dark:text-gray-300 transition-colors">
          <span class="material-symbols-outlined text-md">assignment</span>
          Sample
        </button>
      </div>
    </div>

    <div class="canvas-container relative">
      <div id="image-preview-container" class="absolute top-4 right-4 z-10 hidden">
        <div class="relative group">
          <img id="image-preview" src="#" alt="Quiz Context" class="w-32 h-32 object-cover rounded-lg border-2 border-md-primary shadow-lg transition-transform hover:scale-105" />
          <button id="remove-image-btn" class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full p-1 shadow-md hover:bg-red-700 transition-colors">
            <span class="material-symbols-outlined text-sm">close</span>
          </button>
        </div>
      </div>
      <textarea id="quiz-json-input" rows="10" 
        class="w-full p-4 bg-md-surface dark:bg-gray-900 font-mono text-sm resize-y focus:outline-none dark:text-gray-300" 
        placeholder="Describe your quiz or paste JSON here..."></textarea>
      <div id="autocomplete-dropdown" class="autocomplete-dropdown absolute z-50 hidden bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md shadow-lg max-h-48 overflow-y-auto min-w-[200px]"></div>
    </div>
    
    <footer class="status-bar flex items-center justify-between px-4 py-1.5 bg-gray-50 dark:bg-gray-800 border-t border-md-outline dark:border-gray-600 text-xs">
      <div class="flex items-center gap-4">
        <span id="mode-indicator" class="text-[10px] uppercase tracking-wider text-md-on-surface-variant opacity-75 font-bold">
          Mode: Prompt
        </span>
      </div>
      
      <button id="load-quiz-btn" aria-label="Load Quiz" title="Launch Quiz"
        class="flex items-center gap-2 px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-md transform hover:-translate-y-0.5 active:translate-y-0 transition-all">
        <span class="material-symbols-outlined text-lg">play_arrow</span>
        <span class="text-xs font-bold uppercase tracking-widest">Launch</span>
      </button>
    </footer>
  </div>

  <div class="library-section bg-md-surface-variant/30 dark:bg-gray-900/30 p-4 rounded-lg border border-md-outline dark:border-gray-700">
    <h3 class="text-[10px] font-bold text-md-on-surface-variant dark:text-gray-500 mb-3 uppercase tracking-[0.2em]">
      Saved Quizzes
    </h3>
    <div class="flex items-center gap-3">
      <div class="relative flex-grow">
          <select id="saved-quizzes" 
            class="w-full appearance-none p-2.5 pl-4 bg-md-surface dark:bg-gray-800 border border-md-outline rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none dark:text-white transition-all">
            <option value="" disabled selected>Select a saved quiz...</option>
          </select>
          <span class="material-symbols-outlined absolute right-3 top-2.5 pointer-events-none opacity-50">expand_more</span>
      </div>

      <button id="delete-quiz-btn" aria-label="Delete Quiz" title="Delete"
        class="p-2.5 text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-all">
        <span class="material-symbols-outlined">delete</span>
      </button>
    </div>
</div>
</section>
  
  <div id="progress-bar" class="progress-container mb-8 hidden">
    <div class="progress-header flex justify-between mb-2 text-sm font-medium text-md-on-surface-variant dark:text-gray-300">
      <span id="progress-text">1/5</span>
    </div>
    <div class="progress-track w-full bg-md-surface-variant dark:bg-gray-700 rounded-full h-2 overflow-hidden">
      <div id="progress-meter" class="progress-meter bg-md-primary dark:bg-blue-600 h-2 rounded-full transition-all duration-500 ease-out" style="width: 0%;"></div>
    </div>
  </div>
  
  <div id="quiz-container" class="quiz-container space-y-6 text-md-on-surface dark:text-gray-100 hidden">
  </div>
  
  <div id="navigation-buttons" class="navigation-buttons flex justify-between items-center mt-8 space-x-4 hidden">
    <button id="prev-btn" class="md-outlined-button border-2 border-md-outline hover:bg-md-surface-variant text-md-on-surface dark:border-gray-600 dark:hover:bg-gray-700 dark:text-gray-200 font-medium py-3 px-6 rounded-md-xl inline-flex items-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200" disabled>
      <span class="material-symbols-outlined">chevron_left</span>
      <span>Previous</span>
    </button>
    <button id="submit-btn" class="md-filled-button bg-md-primary hover:bg-opacity-90 text-white font-medium py-3 px-8 rounded-md-xl inline-flex items-center space-x-2 shadow-md-2 transition-all duration-200">
      <span>Submit</span>
      <span class="material-symbols-outlined">send</span>
    </button>
    <button id="next-btn" class="md-filled-button bg-md-primary hover:bg-opacity-90 text-white font-medium py-3 px-6 rounded-md-xl inline-flex items-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed shadow-md-2 transition-all duration-200">
      <span>Next</span>
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>
  
  <div id="result-container" class="result-container mt-8 hidden text-center text-md-on-surface dark:text-gray-100">
    <div class="result-score bg-md-primary-container dark:bg-gray-700 rounded-md-2xl p-6 mb-6">
      <h2 class="result-score__title text-3xl font-medium mb-4 text-md-on-primary-container dark:text-gray-100">Your Score</h2>
      <p id="score-text" class="result-score__value text-xl text-md-on-primary-container dark:text-gray-200"></p>
    </div>
    <div id="summary-container" class="summary-container text-left max-h-96 overflow-y-auto bg-md-surface-variant dark:bg-gray-800 rounded-md-lg p-4 mb-6"></div>
    <div id="summary-buttons" class="summary-buttons flex flex-wrap justify-center gap-4">
      <button id="back-to-setup-btn" class="md-outlined-button border-2 border-md-outline hover:bg-md-surface-variant text-md-on-surface dark:border-gray-600 dark:hover:bg-gray-700 dark:text-gray-200 font-medium py-3 px-6 rounded-md-xl inline-flex items-center gap-2 transition-all duration-200">
        <span class="material-symbols-outlined">home</span>
        <span>Back to Quiz Setup</span>
      </button>
      <button id="restart-btn" class="md-filled-button bg-md-primary hover:bg-opacity-90 text-white font-medium py-3 px-6 rounded-md-xl inline-flex items-center gap-2 shadow-md-2 transition-all duration-200">
        <span class="material-symbols-outlined">refresh</span>
        <span>Restart Quiz</span>
      </button>
    </div>
  </div>

  <!-- P2P Share Modal -->
  <div id="p2p-share-modal" class="p2p-modal fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
    <div class="p2p-modal__content bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 max-w-md w-full mx-4">
      <div class="p2p-modal__header flex justify-between items-center mb-4">
        <h3 class="p2p-modal__title text-xl font-medium text-gray-900 dark:text-gray-100">Share Quiz</h3>
        <button id="close-share-modal" class="p2p-modal__close text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Your Receiver Code:</label>
          <div id="my-peer-id" class="p2p-modal__peer-id bg-gray-100 dark:bg-gray-700 p-3 rounded-md text-center font-mono text-lg font-bold text-blue-600 dark:text-blue-400">Generating...</div>
          <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">Share this code with the person who will receive the quiz.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Connection Status:</label>
          <div id="share-status" class="p2p-modal__status text-sm text-gray-600 dark:text-gray-400">Waiting for receiver...</div>
        </div>
        <div id="share-actions" class="p2p-modal__actions flex gap-2">
          <button id="start-receiving-btn" class="md-filled-button bg-md-primary hover:bg-opacity-90 text-white font-medium py-2 px-4 rounded-md-xl flex-1">
            <span class="material-symbols-outlined text-lg">play_circle</span>
            Start Sharing
          </button>
          <button id="stop-receiving-btn" class="md-filled-tonal-button bg-md-error-container hover:bg-opacity-80 text-md-error font-medium py-2 px-4 rounded-md-xl flex-1 hidden">
            <span class="material-symbols-outlined text-lg">stop_circle</span>
            Stop Sharing
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- P2P Download Modal -->
  <div id="p2p-download-modal" class="p2p-modal fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
    <div class="p2p-modal__content bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 max-w-md w-full mx-4">
      <div class="p2p-modal__header flex justify-between items-center mb-4">
        <h3 class="p2p-modal__title text-xl font-medium text-gray-900 dark:text-gray-100">Receive Quiz</h3>
        <button id="close-download-modal" class="p2p-modal__close text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Enter Sender's Code:</label>
          <input type="text" id="target-peer-id" placeholder="e.g., A3F7" class="p2p-modal__input w-full p-3 border-2 border-md-outline rounded-md-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 focus:border-md-primary dark:focus:border-blue-400 focus:outline-none uppercase" maxlength="6">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Status:</label>
          <div id="download-status" class="p2p-modal__status text-sm text-gray-600 dark:text-gray-400">Ready to connect</div>
        </div>
        <div id="download-actions" class="p2p-modal__actions flex gap-2">
          <button id="connect-to-peer-btn" class="md-filled-button bg-md-primary hover:bg-opacity-90 text-white font-medium py-2 px-4 rounded-md-xl flex-1">
            <span class="material-symbols-outlined text-lg">download</span>
            Connect & Receive
          </button>
        </div>
        <div id="received-json-container" class="hidden">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Received Quiz JSON:</label>
          <pre id="received-json-preview" class="p2p-modal__json-preview bg-gray-100 dark:bg-gray-700 p-3 rounded-md text-xs overflow-x-auto max-h-48"></pre>
        </div>
      </div>
    </div>
  </div>
</div>
