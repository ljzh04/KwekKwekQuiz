<div id="settings-section" class="content-section hidden mx-auto p-8 space-y-2">
  <div class="settings-section__header">
    <h2 class="settings-section__title">Settings</h2>
  </div>
  
  <div class="settings-group">
    <h3 class="settings-group__title">Appearance</h3>
    
    <div class="setting-item">
      <div class="setting-item__info">
        <label for="dark-mode-toggle-setting" class="setting-item__label">Dark Mode</label>
        <span class="setting-item__description">Switch between light and dark themes</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="dark-mode-toggle-setting" aria-label="Toggle Dark Mode">
        <span class="switch-track">
          <span class="switch-thumb">
            <span id="sun-icon-setting" class="material-symbols-outlined">light_mode</span>
            <span id="moon-icon-setting" class="material-symbols-outlined hidden">dark_mode</span>
          </span>
        </span>
      </label>
    </div>

    <div class="setting-item">
      <div class="setting-item__info">
        <label for="animation-toggle-setting" class="setting-item__label">Enable Animations</label>
        <span class="setting-item__description">Smooth transitions and effects</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="animation-toggle-setting" aria-label="Toggle Animations" checked>
        <span class="switch-track">
          <span class="switch-thumb">
            <span id="bolt-on-setting" class="material-symbols-outlined">bolt</span>
            <span id="bolt-off-setting" class="material-symbols-outlined hidden">bolt</span>
          </span>
        </span>
      </label>
    </div>
  </div>
  
  <div class="settings-group">
    <h3 class="settings-group__title">Quiz Experience</h3>
    
    <div class="setting-item">
      <div class="setting-item__info">
        <label for="randomize-questions-setting" class="setting-item__label">Randomize Questions</label>
        <span class="setting-item__description">Shuffle the order of questions in quizzes</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="randomize-questions-setting" aria-label="Toggle Randomize Questions">
        <span class="switch-track">
          <span class="switch-thumb">
            <span id="shuffle-on-setting" class="material-symbols-outlined">shuffle</span>
            <span id="shuffle-off-setting" class="material-symbols-outlined hidden">shuffle</span>
          </span>
        </span>
      </label>
    </div>

    <div class="setting-item">
      <div class="setting-item__info">
        <label for="randomize-choices-setting" class="setting-item__label">Randomize Choices</label>
        <span class="setting-item__description">Shuffle the order of answers for each question</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="randomize-choices-setting" aria-label="Toggle Randomize Choices">
        <span class="switch-track">
          <span class="switch-thumb">
            <span id="swap-calls-on-setting" class="material-symbols-outlined">swap_calls</span>
            <span id="swap-calls-off-setting" class="material-symbols-outlined hidden">swap_calls</span>
          </span>
        </span>
      </label>
    </div>
  </div>
  
  <div class="settings-group">
    <h3 class="settings-group__title">AI Configuration</h3>
    <div class="api-key-container px-2">
      <div class="md-text-field">
        <label for="api-key-setting-input" class="block mb-2 font-medium text-sm text-md-on-surface-variant">Gemini API Key</label>
        <div class="relative flex items-center"> 
          <input type="password" id="api-key-setting-input" class="w-full p-4 border-2 border-md-outline rounded-xl dark:bg-gray-800 focus:border-md-primary focus:outline-none transition-all duration-200 pr-12" placeholder="Enter your Gemini API key" />
          <button id="toggle-api-key-visibility" class="api-key-toggle" aria-label="Toggle API Key visibility">
            <span class="material-symbols-outlined" id="api-key-visibility-icon">visibility_off</span>
          </button>
        </div>
      </div>
      <div class="api-key-actions">
        <button id="save-api-key-btn" class="md-filled-button py-2.5 px-6 rounded-xl">Save API Key</button>
        <button id="clear-api-key-btn" class="md-outlined-button py-2.5 px-6 rounded-xl">Clear Saved Key</button>
      </div>
      <p class="text-xs text-md-on-surface-variant mt-3 ml-1">Your key is stored locally in your browser for security.</p>
    </div>
  </div>
  
  <div class="settings-group">
    <h3 class="settings-group__title">Data Management</h3>
    <div class="data-management px-2">
      <button id="export-quizzes-btn" class="md-filled-tonal-button">
        <span class="material-symbols-outlined mr-3">download</span>
        Export All Quizzes
      </button>
      <label for="import-quizzes-input" class="md-filled-tonal-button cursor-pointer flex items-center">
        <span class="material-symbols-outlined mr-3">upload</span>
        Import Quizzes from JSON
      </label>
      <input type="file" id="import-quizzes-input" class="hidden" accept=".json">
      <button id="clear-all-quizzes-btn" class="md-filled-button bg-md-error text-md-on-error hover:bg-opacity-90 dark:bg-red-700">
        <span class="material-symbols-outlined mr-3">delete_forever</span>
        Clear All Local Data
      </button>
    </div>
  </div>
</div>
